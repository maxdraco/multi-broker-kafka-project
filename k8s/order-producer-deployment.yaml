---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-producer
  namespace: kafka-producers
  labels:
    app: order-producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-producer
  template:
    metadata:
      labels:
        app: order-producer
    spec:
      containers:
        - name: order-producer
          image: order-producer:1.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: producer-config
                  key: kafka-bootstrap-servers
            - name: KAFKA_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: producer-config
                  key: kafka-topic
            # Kafka producer timeout configuration via environment variables
            # Use underscores for dot-notation properties in environment variables
            - name: SPRING_KAFKA_PRODUCER_PROPERTIES_REQUEST_TIMEOUT_MS
              value: "10000"
            - name: SPRING_KAFKA_PRODUCER_PROPERTIES_LINGER_MS
              value: "10"
            - name: SPRING_KAFKA_PRODUCER_PROPERTIES_DELIVERY_TIMEOUT_MS
              value: "120000"
            # Alternative: try setting as direct Spring Boot producer properties
            - name: SPRING_KAFKA_PRODUCER_CONFIGURATION_REQUEST__TIMEOUT__MS
              value: "10000"
            - name: SPRING_KAFKA_PRODUCER_CONFIGURATION_DELIVERY__TIMEOUT__MS
              value: "120000"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: order-producer-service
  namespace: kafka-producers
  labels:
    app: order-producer
spec:
  type: ClusterIP
  selector:
    app: order-producer
  ports:
    - name: http
      port: 8080
      targetPort: 8080
