---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: schema-registry
  namespace: kafka-platform
  labels:
    app: schema-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: schema-registry
  template:
    metadata:
      labels:
        app: schema-registry
    spec:
      containers:
        - name: schema-registry
          image: apicurio/apicurio-registry-kafkasql:2.5.0.Final
          ports:
            - containerPort: 8080
              name: http
          env:
            # Storage backend - use Kafka
            - name: REGISTRY_DATASOURCE_URL
              value: "jdbc:h2:mem:registry"
            - name: REGISTRY_KAFKASQL_BOOTSTRAP_SERVERS
              value: "kafka-service:9092"
            - name: REGISTRY_KAFKASQL_TOPIC
              value: "apicurio-storage"
            # Compatibility
            - name: REGISTRY_COMPATIBILITY_LEVEL
              value: "BACKWARD"
            # Logging
            - name: QUARKUS_LOG_LEVEL
              value: "INFO"
            - name: REGISTRY_LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: schema-registry
  namespace: kafka-platform
  labels:
    app: schema-registry
spec:
  type: ClusterIP
  selector:
    app: schema-registry
  ports:
    - name: http
      port: 8081
      targetPort: 8080
